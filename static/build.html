<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Build Ingredienti</title>
<style>
body{font-family:sans-serif;background:#FAF6EE;padding:30px;max-width:600px;margin:0 auto}
h1{font-family:Georgia,serif;color:#1A1A18}
button{padding:14px 28px;border:none;border-radius:10px;font-size:15px;cursor:pointer;margin:6px 4px;color:#fff}
#log{background:#1A1A18;color:#90EE90;padding:20px;border-radius:10px;font-family:monospace;font-size:12px;margin-top:20px;min-height:120px;white-space:pre-wrap}
</style>
</head>
<body>
<h1>Build Dataset Ingredienti</h1>
<p>Genera i profili per tutti gli ingredienti F&B.</p>
<button style="background:#C77B3F" onclick="avviaBatch()">Avvia build (batch auto)</button>
<button style="background:#8B4513" onclick="avvia()">Build completo (background)</button>
<button style="background:#1A6B1A" onclick="buildContinuo()" id="btn-continuo">▶▶ Build server (non si ferma)</button>
<button style="background:#006B6B" onclick="buildCron()" id="btn-cron">⚡ Build rapido (1 per sec)</button>
<button style="background:#8B4513" onclick="avviaDisc('cucina_asiatica')">Asiatica</button>
<button style="background:#8B4513" onclick="avviaDisc('cucina_mediorientale')">Mediorientale</button>
<button style="background:#8B4513" onclick="avviaDisc('cucina_latinoamericana')">Latinoamericana</button>
<button style="background:#8B4513" onclick="avviaDisc('fermentati')">Fermentati</button>
<button style="background:#2C6E63" onclick="stato()">Stato</button>
<button style="background:#6B6257;margin-top:12px" onclick="seedSicurezza()">Seed sicurezza alimentare</button>
<button style="background:#4A4A8A;margin-top:6px" onclick="buildArchi()">Crea archi abbinamento</button>
<button style="background:#4A6B4A;margin-top:6px" onclick="buildTargets()">Popola target number</button>
<button style="background:#2C4A6B;margin-top:6px" onclick="migrateModello()">Migrate DB modello</button>
<div id="log">Premi Stato per vedere i progressi...</div>
<script>
function getS() {
  return new URLSearchParams(window.location.search).get('s') || '';
}
function avvia() {
  document.getElementById('log').textContent = 'Avvio...';
  fetch('/admin/build-ingredienti', {
    method: 'POST',
    headers: { 'X-Admin-Secret': getS(), 'Content-Type': 'application/json' },
    body: '{}'
  }).then(function(r) {
    return r.json();
  }).then(function(j) {
    document.getElementById('log').textContent = JSON.stringify(j, null, 2);
    setTimeout(stato, 3000);
  }).catch(function(e) {
    document.getElementById('log').textContent = 'Errore: ' + e;
  });
}
async function buildArchi(){
  document.getElementById('log').textContent = 'Creazione archi in corso (può richiedere 2-3 min)...';
  try {
    var r = await fetch('/admin/build-archi', {
      method: 'POST',
      headers: { 'X-Admin-Secret': getS(), 'Content-Type': 'application/json' }
    });
    var j = await r.json();
    document.getElementById('log').textContent = JSON.stringify(j, null, 2);
  } catch(e) {
    document.getElementById('log').textContent = 'Errore: ' + e;
  }
}
async function migrateModello(){
  document.getElementById('log').textContent = 'Migrate in corso...';
  try {
    var r = await fetch('/v1/admin/migrate-modello', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({secret: getS()})
    });
    var j = await r.json();
    document.getElementById('log').textContent = JSON.stringify(j, null, 2);
  } catch(e) {
    document.getElementById('log').textContent = 'Errore: ' + e;
  }
}
async function buildTargets(){
  document.getElementById('log').textContent = 'Popolamento target number...';
  try {
    var r = await fetch('/admin/build-targets', {
      method: 'POST',
      headers: { 'X-Admin-Secret': getS(), 'Content-Type': 'application/json' }
    });
    var j = await r.json();
    document.getElementById('log').textContent = JSON.stringify(j, null, 2);
  } catch(e) {
    document.getElementById('log').textContent = 'Errore: ' + e;
  }
}
async function seedSicurezza(){
  document.getElementById('log').textContent = 'Seed sicurezza in corso...';
  try {
    var r = await fetch('/admin/seed-sicurezza', {
      method: 'POST',
      headers: { 'X-Admin-Secret': getS(), 'Content-Type': 'application/json' }
    });
    var j = await r.json();
    document.getElementById('log').textContent = 
      'OK: ' + (j.ok||[]).join(', ') + 
      (j.errori&&j.errori.length ? '\nErrori: ' + j.errori.join(', ') : '');
  } catch(e) {
    document.getElementById('log').textContent = 'Errore: ' + e;
  }
}
var _cronTimer = null;
async function buildCron(){
  var btn = document.getElementById('btn-cron');
  if(_cronTimer){
    clearInterval(_cronTimer);
    _cronTimer = null;
    btn.textContent = '⚡ Build rapido (1 per sec)';
    btn.style.background = '#006B6B';
    return;
  }
  btn.textContent = '⏸ Ferma build rapido';
  btn.style.background = '#8B0000';
  var tot = 0;
  _cronTimer = setInterval(async function(){
    try {
      var r = await fetch('/admin/build-cron?s='+getS());
      var j = await r.json();
      if(!j.ok){ clearInterval(_cronTimer); _cronTimer=null; btn.textContent='⚡ Build rapido'; document.getElementById('log').textContent='Errore: '+(j.errore||'?'); return; }
      if(j.completato){ clearInterval(_cronTimer); _cronTimer=null; btn.textContent='✓ COMPLETATO'; document.getElementById('log').textContent='COMPLETATO! Totale: '+j.totale; return; }
      tot++;
      document.getElementById('log').textContent = 'Generati questa sessione: '+tot+'\nUltimo: '+j.ingrediente+' ('+j.disciplina+')\nTotale DB: '+j.totale;
    } catch(e){ /* ignora errori singoli */ }
  }, 1100);
}
async function buildContinuo(){
  var btn = document.getElementById('btn-continuo');
  btn.textContent = '⏳ Avviato — controlla Stato';
  btn.disabled = true;
  try {
    var r = await fetch('/admin/build-continuo', {
      method:'POST',
      headers:{'X-Admin-Secret':getS(),'Content-Type':'application/json'}
    });
    var j = await r.json();
    document.getElementById('log').textContent = j.messaggio || JSON.stringify(j);
    // Auto-aggiorna stato ogni 30 secondi
    setInterval(stato, 30000);
  } catch(e) {
    document.getElementById('log').textContent = 'Errore: ' + e;
    btn.disabled = false;
  }
}
var _batchRunning = false;
async function avviaBatch(){
  if(_batchRunning){ _batchRunning=false; document.getElementById('log').textContent += '\nFermato.'; return; }
  _batchRunning = true;
  var totOk = 0;
  document.getElementById('log').textContent = 'Build batch avviato — premi di nuovo per fermare...';
  while(_batchRunning){
    try {
      var r = await fetch('/admin/build-batch', {
        method:'POST',
        headers:{'X-Admin-Secret':getS(),'Content-Type':'application/json'},
        body:JSON.stringify({n:15})
      });
      var j = await r.json();
      if(j.errore){ document.getElementById('log').textContent += '\nErrore: '+j.errore; break; }
      totOk += j.generati||0;
      document.getElementById('log').textContent = 'Generati in questa sessione: '+totOk+'\nUltimo batch: '+j.generati+' ok, '+j.errori+' errori, costo '+j.costo;
      if(!j.prossimo_batch){ document.getElementById('log').textContent += '\n\nCOMPLETATO!'; _batchRunning=false; break; }
      await new Promise(res=>setTimeout(res,500));
    } catch(e){
      document.getElementById('log').textContent += '\nErrore: '+e; break;
    }
  }
  _batchRunning = false;
}
async function avviaDisc(disc){
  document.getElementById('log').textContent = 'Avvio build disciplina: ' + disc + '...';
  try {
    var r = await fetch('/admin/build-ingredienti', {
      method:'POST', headers:{'X-Admin-Secret':getS(),'Content-Type':'application/json'},
      body:JSON.stringify({discipline:[disc]})
    });
    var j = await r.json();
    document.getElementById('log').textContent = JSON.stringify(j,null,2);
    setTimeout(stato,5000);
  } catch(e){ document.getElementById('log').textContent='Errore: '+e; }
}
function stato() {
  fetch('/admin/build-status', {
    headers: { 'X-Admin-Secret': getS() }
  }).then(function(r) {
    return r.json();
  }).then(function(j) {
    if (j.errore) { document.getElementById('log').textContent = 'Errore: ' + j.errore; return; }
    var d = Object.keys(j.per_disciplina || {}).map(function(k) {
      return k + ': ' + j.per_disciplina[k];
    }).join('\n');
    document.getElementById('log').textContent =
      'Generati: ' + (j.totale_generati || 0) + ' | Nodi: ' + (j.nodi_ingrediente || 0) + '\n\n' + d;
  }).catch(function(e) {
    document.getElementById('log').textContent = 'Errore: ' + e;
  });
}
</script>
</body>
</html>
