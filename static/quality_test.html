const CALC = [{"calc": "diluizione", "params": {"ingredienti": [{"n": "Gin", "vol": 60, "abv": 40}, {"n": "Vermouth", "vol": 30, "abv": 18}], "diluizione": 22, "metodo": "stirred"}, "attesa": "ABV finale circa 26-28%"}, {"calc": "diluizione", "params": {"ingredienti": [{"n": "Bourbon", "vol": 45, "abv": 45}, {"n": "Campari", "vol": 30, "abv": 25}, {"n": "Vermouth", "vol": 30, "abv": 16}], "diluizione": 22, "metodo": "stirred"}, "attesa": "ABV finale circa 24-26%"}, {"calc": "bilanciamento_sour", "params": {"vol_acido": 25, "acidita_pct": 5.5, "vol_dolce": 20, "zuccheri_pct": 65, "vol_spiritoso": 50, "abv": 40}, "attesa": "rapporto sour bilanciato"}, {"calc": "idratazione_pane", "params": {"farina": 1000, "acqua": 680, "sale": 20, "lievito": 3}, "attesa": "idratazione 68%, baker percentages corretti"}, {"calc": "q10_fermentazione", "params": {"tempo_base": 4, "temp_base": 20, "temp_nuova": 26}, "attesa": "tempo ridotto circa 2 ore (Q10 raddoppia ogni 10°C)"}, {"calc": "estrazione_caffe", "params": {"dose": 18, "bevanda": 36, "tds": 9.5}, "attesa": "EY circa 19%, zona dolce"}, {"calc": "estrazione_caffe", "params": {"dose": 15, "bevanda": 250, "tds": 1.35}, "attesa": "EY circa 22-23%, zona dolce filtro"}, {"calc": "pareggia_acidita", "params": {"vol_ml": 750, "ph_attuale": 3.8, "ph_target": 3.2}, "attesa": "grammi acido citrico da aggiungere"}, {"calc": "diluizione", "params": {"ingredienti": [{"n": "Vodka", "vol": 50, "abv": 40}], "diluizione": 25, "metodo": "shaken"}, "attesa": "ABV finale circa 30%"}, {"calc": "bilanciamento_sour", "params": {"vol_acido": 30, "acidita_pct": 6.0, "vol_dolce": 15, "zuccheri_pct": 65, "vol_spiritoso": 60, "abv": 37}, "attesa": "sour aggressivo, alta acidità"}];

const DISC_COL = {bar:'#C77B3F',panificazione:'#4D2C1A',caffe:'#6F6A60',gelateria:'#2C6E63',cucina:'#7a6555',vino:'#8B4513',birra:'#D3B566',pasticceria:'#C77B3F'};

let token = '', running = false, stopped = false;
let scores = {chat:[], lezioni:[], flavor:[], calc:[]};

function sc(v) { return v>=8?'v-green':v>=6?'v-orange':'v-red'; }
function sf(v) { return v>=8?'f-green':v>=6?'f-orange':'f-red'; }

async function login() {
  const r = await fetch(`${document.getElementById('base-url').value}/v1/auth/login`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({email:document.getElementById('email').value, password:document.getElementById('pwd').value})
  });
  const j = await r.json();
  return j.token || '';
}

async function chiedi(domanda) {
  const r = await fetch(`${document.getElementById('base-url').value}/chiedi`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({domanda, lang:'it', token})
  });
  const j = await r.json();
  return j.risposta || j.nota || 'Nessuna risposta';
}

async function evalChat(domanda, risposta, attesa) {
  const r = await fetch(`${document.getElementById('base-url').value}/v1/quality-eval`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({domanda, risposta, attesa})
  });
  return await r.json();
}

async function testLezione(disc, step, verifica) {
  const base = document.getElementById('base-url').value;
  const r = await fetch(`${base}/lezione/${disc}/${step}?lang=it&token=${token}`);
  const j = await r.json();
  const scheda = j.fenomeno?.scheda || j.fenomeno?.principio || '';
  const nome = j.fenomeno?.nome || '';
  const target = j.fenomeno?.target || '';
  const contenuto = scheda + ' ' + target;
  const ok = contenuto.length > 50;
  return {
    nome, scheda: scheda.substring(0,200), target,
    voto_globale: ok ? 7 : 3,
    accuratezza: ok ? 7 : 3, utilita: ok ? 7 : 3, numeri: target.length > 20 ? 8 : 4,
    tono: 7, allucinazioni: 8,
    note: ok ? `Scheda presente (${scheda.length} chars), target: ${target.substring(0,60)}` : 'Scheda assente o troppo breve'
  };
}

async function testFlavor(ingrediente, attesa_abbinamenti) {
  const base = document.getElementById('base-url').value;
  // Cerca alias
  const ALIAS = {limone:'lemon',caffè:'coffee',caffe:'coffee',lampone:'raspberry',menta:'peppermint',vaniglia:'tahiti_vanilla',burro:'butter',whiskey:'whiskey',fragola:'strawberry',pomodoro:'tomato',aglio:'garlic',gin:'gin',cioccolato:'cocoa',zenzero:'ginger',basilico:'basil',rum:'rum',parmigiano:'parmesan',miele:'honey',pepe:'black_pepper',cocco:'coconut','noce moscata':'nutmeg'};
  const ing_en = ALIAS[ingrediente.toLowerCase()] || ingrediente;
  const r = await fetch(`${base}/v1/abbina/${encodeURIComponent(ing_en)}`);
  const j = await r.json();
  const nomi = (j.abbinamenti || []).map(a => a.nome?.toLowerCase() || '');
  const trovati = attesa_abbinamenti.filter(a => nomi.some(n => n.includes(a.toLowerCase()) || a.toLowerCase().includes(n)));
  const pct = trovati.length / attesa_abbinamenti.length;
  const voto = Math.round(4 + pct * 6);
  return {
    ingrediente, n_abbinamenti: nomi.length, trovati: trovati.length, attesi: attesa_abbinamenti.length,
    voto_globale: voto, accuratezza: voto, utilita: voto, numeri: 7, tono: 8, allucinazioni: 9,
    note: `${trovati.length}/${attesa_abbinamenti.length} abbinamenti attesi trovati su ${nomi.length} totali`
  };
}

async function testCalc(calc, params, attesa) {
  const base = document.getElementById('base-url').value;
  try {
    const body = {calcolo: calc, parametri: params};
    // Prova endpoint principale
    const r = await fetch(`${base}/calcola`, {
      method:'POST', headers:{'Content-Type':'application/json', 'X-Token': token},
      body: JSON.stringify(body)
    });
    const j = await r.json();
    const ok = !j.errore && Object.keys(j).length > 1;
    return {
      calc, risultato: JSON.stringify(j).substring(0,150),
      voto_globale: ok ? 8 : 4, accuratezza: ok ? 8 : 4, utilita: ok ? 8 : 4,
      numeri: ok ? 9 : 3, tono: 9, allucinazioni: 10,
      note: ok ? `Calcolo OK: ${JSON.stringify(j).substring(0,80)}` : `Errore: ${j.errore}`
    };
  } catch(e) {
    return {calc, voto_globale:2, accuratezza:2, utilita:2, numeri:2, tono:9, allucinazioni:10, note:`Errore fetch: ${e.message}`};
  }
}

function addCard(tipo, n, domanda, risposta, val, extra='') {
  const g = val.voto_globale || 0;
  const col = DISC_COL[extra] || '#6F6A60';
  const div = document.createElement('div');
  div.className = 'result-card';
  div.innerHTML = `
    <div class="result-header">
      <div class="badge" style="background:${col}20;color:${col}">${tipo}</div>
      <div class="q-text">${n}. ${domanda.substring(0,80)}${domanda.length>80?'…':''}</div>
      <div class="score ${sc(g)}">${g.toFixed?g.toFixed(1):g}</div>
    </div>
    <div class="risposta">${risposta.substring(0,300)}${risposta.length>300?'…':''}</div>
    <div class="scores">
      ${['accuratezza','utilita','numeri','tono','allucinazioni'].map(k=>{
        const v=val[k]||0;
        const lab={accuratezza:'Acc',utilita:'Util',numeri:'Num',tono:'Tono',allucinazioni:'Hall'};
        return `<div class="sc"><div class="sl">${lab[k]}</div><div class="sv ${sc(v)}">${v}</div></div>`;
      }).join('')}
    </div>
    ${val.note?`<div class="note">${val.note}</div>`:''}
  `;
  document.getElementById('results').insertBefore(div, document.getElementById('results').firstChild);
}

function updateSummary() {
  document.getElementById('summary').style.display = 'grid';
  const all = [...scores.chat, ...scores.lezioni, ...scores.flavor, ...scores.calc];
  const avg = arr => arr.length ? arr.reduce((s,v)=>s+v,0)/arr.length : 0;
  const g = avg(all); const c = avg(scores.chat); const l = avg(scores.lezioni); const f = avg([...scores.flavor,...scores.calc]);
  [['g',g],['chat',c],['les',l],['fl',f]].forEach(([k,v])=>{
    document.getElementById(`avg-${k}`).textContent = v.toFixed(1)+'/10';
    document.getElementById(`avg-${k}`).className = `value ${sc(v)}`;
    document.getElementById(`bar-${k}`).style.width = (v*10)+'%';
  });
}

async function runSection(section) {
  if (running) return;
  if (!token) {
    document.getElementById('status').textContent = 'Login in corso...';
    token = await login();
    if (!token) { document.getElementById('status').textContent = 'Login fallito'; return; }
  }
  
  running = true; stopped = false;
  document.getElementById('stop-btn').style.display = 'inline-block';
  document.getElementById('run-btn').disabled = true;
  
  const base = document.getElementById('base-url').value;
  
  if (section === 'chat') {
    document.getElementById('results').insertAdjacentHTML('afterbegin', '<div class="section-label">CHAT — 50 domande</div>');
    for (let i=0; i<CHAT.length && !stopped; i++) {
      const d = CHAT[i];
      document.getElementById('status').textContent = `Chat [${i+1}/50] ${d.q.substring(0,50)}...`;
      document.getElementById('progress').style.width = ((i+1)/50*100)+'%';
      const risp = await chiedi(d.q);
      const val = await evalChat(d.q, risp, d.attesa);
      scores.chat.push(val.voto_globale||5);
      addCard('CHAT', i+1, d.q, risp, val, d.disciplina||'');
      updateSummary();
      await new Promise(r=>setTimeout(r,1200));
    }
  }
  
  if (section === 'lezioni') {
    document.getElementById('results').insertAdjacentHTML('afterbegin', '<div class="section-label">LEZIONI — qualità schede fenomeni</div>');
    for (let i=0; i<LEZIONI.length && !stopped; i++) {
      const d = LEZIONI[i];
      document.getElementById('status').textContent = `Lezione [${i+1}/20] ${d.disciplina} step ${d.step}...`;
      document.getElementById('progress').style.width = ((i+1)/20*100)+'%';
      const val = await testLezione(d.disciplina, d.step, d.verifica);
      scores.lezioni.push(val.voto_globale||5);
      addCard('LEZIONE', i+1, `${d.disciplina} step${d.step}: ${d.verifica}`, val.scheda||'', val, d.disciplina);
      updateSummary();
      await new Promise(r=>setTimeout(r,800));
    }
  }
  
  if (section === 'flavor') {
    document.getElementById('results').insertAdjacentHTML('afterbegin', '<div class="section-label">FLAVOR NETWORK — pertinenza abbinamenti</div>');
    for (let i=0; i<FLAVOR.length && !stopped; i++) {
      const d = FLAVOR[i];
      document.getElementById('status').textContent = `Flavor [${i+1}/20] ${d.ingrediente}...`;
      document.getElementById('progress').style.width = ((i+1)/20*100)+'%';
      const val = await testFlavor(d.ingrediente, d.attesa_abbinamenti);
      scores.flavor.push(val.voto_globale||5);
      addCard('FLAVOR', i+1, `Abbinamenti per ${d.ingrediente}`, val.note||'', val, 'bar');
      updateSummary();
      await new Promise(r=>setTimeout(r,600));
    }
  }
  
  if (section === 'calc') {
    document.getElementById('results').insertAdjacentHTML('afterbegin', '<div class="section-label">CALCOLATORI — correttezza numerica</div>');
    for (let i=0; i<CALC.length && !stopped; i++) {
      const d = CALC[i];
      document.getElementById('status').textContent = `Calc [${i+1}/10] ${d.calc}...`;
      document.getElementById('progress').style.width = ((i+1)/10*100)+'%';
      const val = await testCalc(d.calc, d.params, d.attesa);
      scores.calc.push(val.voto_globale||5);
      addCard('CALC', i+1, `${d.calc}: ${d.attesa}`, val.risultato||'', val, 'cucina');
      updateSummary();
      await new Promise(r=>setTimeout(r,600));
    }
  }
  
  running = false;
  document.getElementById('stop-btn').style.display = 'none';
  document.getElementById('run-btn').disabled = false;
  document.getElementById('status').textContent = `✓ Sezione completata.`;
}

async function runAll() {
  document.getElementById('results').innerHTML = '';
  scores = {chat:[], lezioni:[], flavor:[], calc:[]};
  document.getElementById('status').textContent = 'Login in corso...';
  token = await login();
  if (!token) { document.getElementById('status').textContent = 'Login fallito'; return; }
  document.getElementById('status').textContent = 'Login OK. Avvio test completo...';
  for (const section of ['calc','flavor','lezioni','chat']) {
    if (stopped) break;
    await runSection(section);
  }
  document.getElementById('status').textContent = '✓ Test completo terminato.';
}

function stopTest() {
  stopped = true; running = false;
  document.getElementById('stop-btn').style.display = 'none';
  document.getElementById('run-btn').disabled = false;
  document.getElementById('status').textContent = 'Test interrotto.';
}
</script>
